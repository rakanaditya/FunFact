<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FunFact V4</title>

<meta name="theme-color" content="#2563eb">
<meta name="description" content="FunFact Gallery Modern">

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://i.imgur.com">

<link rel="stylesheet" href="style.css">

<link
rel="icon"
type="image/png"
href="images/logo.png">

<link
rel="apple-touch-icon"
href="images/logo.png">

</head>

<body>

<!-- ========================= -->
<!-- Splash Screen -->
<!-- ========================= -->

<div id="splash">

<div class="loader"></div>

<h1>FunFact V.4</h1>

<p>Loading...</p>

</div>

<!-- ========================= -->
<!-- Header -->
<!-- ========================= -->

<header>

<div class="logo">

<img
src="images/logo.png"
alt="Logo">

<span>FunFact V.4</span>

</div>

<div class="header-actions">
  

<input

type="search"

id="search"

placeholder="Cari Judul..."

autocomplete="off">

<button id="favoriteFilter">

❤️ Favorite (<span id="favoriteCount">0</span>)

</button>
  
<button
id="themeButton">

🌙

</button>

</div>

</header>

<!-- ========================= -->
<!-- Category -->
<!-- ========================= -->

<section class="categoryBar">

<button class="category active"

data-category="all">

Semua

</button>

<button
class="category"

data-category="Sad">

😭 Sad

</button>

<button
class="category"

data-category="Happy">

🙂 Happy

</button>

  
<button
class="category"

data-category="Meme">

😂 Meme

</button>

  <button
class="category"

data-category="Anime">

 ⛩️ Anime

  </button>

<button
class="category"

data-category="Sain&Teknologi">

💻 Sain & Teknologi

</button>

  <button
class="category"

data-category="Hewan">

😹 Hewan

  </button>

<button
class="category"

data-category="Lainnya">

⭐ Lainnya

</button>

</section>

<!-- ========================= -->
<!-- Gallery -->
<!-- ========================= -->

<main>

<div
id="gallery"

class="gallery">

<!-- JavaScript -->

</div>

</main>

<!-- ========================= -->
<!-- Back To Top -->
<!-- ========================= -->

<button

id="backTop"

title="Back To Top">

↑

</button>

<!-- ========================= -->
<!-- Floating Button -->
<!-- ========================= -->

<button

id="randomButton"

title="Random">

🎲

</button>

<!-- ========================= -->
<!-- Viewer -->
<!-- ========================= -->

<div

id="viewer"

class="viewer">

<div class="viewerBackground"></div>

<div class="viewerContent">

<button

id="closeViewer"

class="close">

✕

</button>

<img

id="viewerImage"

draggable="false">

<button id="closeVideo" class="closeVideo">✕</button>

<video
id="viewerVideo"
controls
playsinline
style="display:none;">
</video>

<h2 id="viewerTitle"></h2>

<div id="viewerCategory" class="viewerCategory"></div>

<p id="viewerDescription"></p>

<div class="viewerButtons">

<button

id="previousButton">
  ← Previous
</button>

<button

id="favoriteButton">

♡ Favorite

</button>

<button

id="shareButton">

Share

</button>

<a

id="downloadButton"

download>

Download

</a>

<button

id="nextButton">
Next →
</button>

</div>

</div>

</div>

<!-- ========================= -->
<!-- Toast -->
<!-- ========================= -->

<div

id="toast">

</div>

<!-- ========================= -->
<!-- Footer -->
<!-- ========================= -->

<footer>

<div>

FunFact V.4

</div>

<div>

FunFact Gallery

</div>

<div>

© 2026

</div>

</footer>

<script src="script.js"></script>

<script>

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("service-worker.js");

});

}

</script>

</body>

</html>
